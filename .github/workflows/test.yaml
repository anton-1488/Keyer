name: Test Keyer
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Libsecret (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev gnome-keyring dbus-x11

      - name: Test (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          dbus-run-session -- bash -e << 'EOF'
            eval $(gnome-keyring-daemon --start)
            export GNOME_KEYRING_CONTROL
            export SSH_AUTH_SOCK
            echo -n "test" | gnome-keyring-daemon --unlock
            mvn test -DargLine="--enable-native-access=ALL-UNNAMED"
          EOF

      - name: Test (macOS/Windows)
        if: matrix.os != 'ubuntu-latest'
        run: mvn test -DargLine="--enable-native-access=ALL-UNNAMED"