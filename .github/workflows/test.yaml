name: Test Keyer
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Test (macOS/Windows)
        run: mvn test -DargLine="--enable-native-access=ALL-UNNAMED"